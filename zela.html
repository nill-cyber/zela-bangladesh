<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>জেলার বিস্তারিত — জেলা.পাতা.বাংলা</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&family=Noto+Serif+Bengali:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#0d1f14; --forest:#0b5c2e; --leaf:#1a8c47; --mint:#22c55e;
  --cream:#faf8f3; --warm:#f5f0e8; --gold:#c9860a; --gold-light:#f5c842;
  --muted:#5c6e62; --border:#d6e8dc; --radius:14px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:'Hind Siliguri',sans-serif;background:var(--cream);color:var(--ink);overflow-x:hidden;}

body::before{
  content:'';position:fixed;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events:none;z-index:0;
}

/* ── HEADER ── */
header{
  position:sticky;top:0;z-index:200;
  background:rgba(13,31,20,0.96);backdrop-filter:blur(20px);
  border-bottom:1px solid rgba(255,255,255,.06);
}
.hdr{max-width:1200px;margin:0 auto;padding:0 28px;display:flex;align-items:center;gap:16px;height:64px;}
.back{
  display:flex;align-items:center;gap:6px;
  color:rgba(255,255,255,.7);text-decoration:none;
  font-size:.85rem;font-weight:500;
  background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.1);
  padding:7px 16px;border-radius:20px;
  transition:all .2s;white-space:nowrap;flex-shrink:0;
}
.back:hover{background:rgba(255,255,255,.15);color:#fff;}
.hlogo{
  font-family:'Noto Serif Bengali',serif;
  font-size:1.1rem;font-weight:700;color:#fff;
  text-decoration:none;margin-right:auto;
}
.hbreadcrumb{
  font-size:.8rem;color:rgba(255,255,255,.4);
  display:flex;align-items:center;gap:6px;
}
.hbreadcrumb span{color:rgba(255,255,255,.7);}

/* ── HERO BANNER ── */
.banner{
  position:relative;height:460px;overflow:hidden;
  background:var(--ink);
}
.banner-img{
  width:100%;height:100%;object-fit:cover;
  transition:transform 8s ease;
  display:block;
}
.banner:hover .banner-img{transform:scale(1.04);}
.banner-grad{
  position:absolute;inset:0;
  background:
    linear-gradient(to top, rgba(13,31,20,.98) 0%, rgba(13,31,20,.55) 45%, rgba(13,31,20,.1) 100%),
    linear-gradient(to right, rgba(13,31,20,.4) 0%, transparent 40%);
}
.banner-content{
  position:absolute;bottom:0;left:0;right:0;
  padding:40px 40px 36px;
  animation:fadeUp .7s ease both;
}
.bmax{max-width:860px;}
.bdiv-tag{
  display:inline-flex;align-items:center;gap:6px;
  background:rgba(201,134,10,.2);
  border:1px solid rgba(245,200,66,.35);
  color:var(--gold-light);
  font-size:.72rem;font-weight:700;
  padding:5px 14px;border-radius:14px;
  margin-bottom:14px;letter-spacing:.06em;text-transform:uppercase;
}
.btitle{
  font-family:'Noto Serif Bengali',serif;
  font-size:clamp(2.5rem,6vw,4.5rem);
  font-weight:900;color:#fff;
  line-height:1.1;margin-bottom:10px;
  letter-spacing:-0.02em;
  text-shadow:0 4px 24px rgba(0,0,0,.4);
}
.btitle .emoji{font-size:.7em;vertical-align:middle;margin-left:8px;}
.bsub{color:rgba(255,255,255,.65);font-size:1.05rem;line-height:1.6;}

/* ── GALLERY ── */
.gallery-wrap{
  background:var(--ink);
  padding:0 0 16px;
  border-bottom:3px solid var(--forest);
}
.gallery{
  display:flex;gap:6px;
  padding:0 28px;
  overflow-x:auto;scrollbar-width:thin;
  scrollbar-color:var(--forest) transparent;
}
.gallery::-webkit-scrollbar{height:3px;}
.gallery::-webkit-scrollbar-track{background:transparent;}
.gallery::-webkit-scrollbar-thumb{background:var(--forest);border-radius:2px;}
.gallery img{
  height:110px;width:180px;object-fit:cover;
  border-radius:8px;flex-shrink:0;
  cursor:pointer;
  transition:transform .25s, opacity .25s;
  opacity:.75;
  border:2px solid rgba(255,255,255,.08);
}
.gallery img:hover{transform:scale(1.05);opacity:1;border-color:var(--mint);}

/* ── STATS BAR ── */
.stats{
  background:var(--warm);
  border-bottom:1px solid var(--border);
}
.stats-inner{
  max-width:1200px;margin:0 auto;
  padding:0 28px;
  display:flex;flex-wrap:wrap;
}
.si{
  flex:1;min-width:120px;
  padding:16px 20px;
  border-right:1px solid var(--border);
  position:relative;overflow:hidden;
}
.si::after{
  content:'';position:absolute;
  bottom:0;left:20px;right:20px;
  height:2px;background:var(--forest);
  transform:scaleX(0);transition:transform .3s;
  transform-origin:left;
}
.si:hover::after{transform:scaleX(1);}
.si:last-child{border-right:none;}
.sin{
  font-family:'Noto Serif Bengali',serif;
  font-size:1.15rem;font-weight:700;
  color:var(--forest);display:block;
}
.sil{font-size:.7rem;color:var(--muted);margin-top:2px;display:block;}

/* ── LAYOUT ── */
.wrap{
  max-width:1200px;margin:0 auto;
  padding:36px 28px 80px;
  display:grid;grid-template-columns:1fr 310px;gap:28px;
}
@media(max-width:900px){.wrap{grid-template-columns:1fr;}}

/* ── SECTIONS ── */
.sec{
  background:#fff;border-radius:var(--radius);
  border:1px solid var(--border);
  overflow:hidden;margin-bottom:22px;
  animation:fadeUp .5s ease both;
}
.sec:nth-child(2){animation-delay:.1s;}
.sec:nth-child(3){animation-delay:.15s;}
.sec:nth-child(4){animation-delay:.2s;}

.sec-header{
  display:flex;align-items:center;gap:12px;
  padding:18px 22px 16px;
  border-bottom:1px solid var(--border);
  background:linear-gradient(135deg,rgba(11,92,46,.03),transparent);
}
.sec-ico{
  width:38px;height:38px;
  background:var(--forest);color:#fff;
  border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-size:1.1rem;flex-shrink:0;
}
.sec-title{
  font-family:'Noto Serif Bengali',serif;
  font-size:1.12rem;font-weight:700;color:var(--forest);
}
.sec-body{padding:22px;}
.prose{font-size:.95rem;line-height:2;color:var(--ink);}
.prose p{margin-bottom:14px;}
.prose p:last-child{margin-bottom:0;}

/* ── PLACES GRID ── */
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:14px;padding:18px;}
.pc{
  background:var(--warm);border-radius:10px;
  border:1px solid var(--border);overflow:hidden;
  transition:transform .2s, box-shadow .2s;
}
.pc:hover{transform:translateY(-3px);box-shadow:0 8px 24px rgba(11,92,46,.1);}
.pc-img{width:100%;height:90px;object-fit:cover;display:block;}
.pc-body{padding:12px;}
.pc-ico{font-size:1.3rem;margin-bottom:5px;}
.pc-name{
  font-family:'Noto Serif Bengali',serif;
  font-size:.93rem;font-weight:700;color:var(--forest);margin-bottom:4px;
}
.pc-desc{font-size:.76rem;color:var(--muted);line-height:1.55;}

/* ── FOOD GRID ── */
.fgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;padding:18px;}
.fc{
  text-align:center;
  background:var(--warm);border-radius:10px;
  padding:18px 12px;border:1px solid var(--border);
  transition:transform .2s, background .2s;
}
.fc:hover{transform:translateY(-3px);background:#fff;}
.fico{font-size:2.2rem;margin-bottom:7px;}
.fname{font-family:'Noto Serif Bengali',serif;font-size:.9rem;font-weight:700;color:var(--forest);}
.fdesc{font-size:.74rem;color:var(--muted);margin-top:4px;line-height:1.45;}

/* ── PERSONS ── */
.plist{display:flex;flex-direction:column;gap:12px;padding:18px;}
.pcard{
  display:flex;gap:14px;align-items:flex-start;
  background:var(--warm);border-radius:10px;
  padding:14px 16px;border:1px solid var(--border);
  transition:transform .2s;
}
.pcard:hover{transform:translateX(4px);}
.pav{
  width:46px;height:46px;border-radius:50%;
  background:linear-gradient(135deg,var(--forest),var(--leaf));
  color:#fff;display:flex;align-items:center;justify-content:center;
  font-size:1.25rem;flex-shrink:0;
  box-shadow:0 4px 12px rgba(11,92,46,.3);
}
.pname{font-family:'Noto Serif Bengali',serif;font-size:.96rem;font-weight:700;color:var(--forest);}
.prole{font-size:.77rem;color:var(--muted);margin-top:3px;line-height:1.45;}

/* ── SIDEBAR ── */
.sbc{
  background:#fff;border-radius:var(--radius);
  border:1px solid var(--border);
  margin-bottom:18px;overflow:hidden;
  animation:fadeUp .5s ease .1s both;
}
.sbt{
  font-family:'Noto Serif Bengali',serif;
  font-size:.95rem;font-weight:700;color:var(--forest);
  padding:16px 20px 14px;
  border-bottom:1px solid var(--border);
  background:linear-gradient(135deg,rgba(11,92,46,.04),transparent);
  display:flex;align-items:center;gap:8px;
}
.sbr{
  display:flex;justify-content:space-between;align-items:center;
  padding:10px 20px;border-bottom:1px solid var(--border);
  font-size:.84rem;transition:background .15s;
}
.sbr:hover{background:rgba(11,92,46,.03);}
.sbr:last-child{border-bottom:none;}
.sbk{color:var(--muted);}
.sbv{font-weight:600;color:var(--ink);}

.tags-wrap{padding:14px 20px;display:flex;flex-wrap:wrap;gap:7px;}
.tag{
  background:var(--warm);color:var(--forest);
  font-size:.76rem;font-weight:600;
  padding:5px 12px;border-radius:16px;
  border:1px solid var(--border);
  transition:background .15s;
}
.tag:hover{background:var(--forest);color:#fff;}

/* ── BOTTOM NAV ── */
.bnav{max-width:1200px;margin:0 auto 40px;padding:0 28px;}
.nb{
  display:inline-flex;align-items:center;gap:8px;
  padding:12px 24px;border-radius:24px;
  background:var(--forest);color:#fff;
  text-decoration:none;font-size:.88rem;font-weight:600;
  transition:background .2s, transform .2s;
  box-shadow:0 4px 16px rgba(11,92,46,.3);
}
.nb:hover{background:var(--leaf);transform:translateY(-2px);}

footer{
  background:var(--ink);color:rgba(255,255,255,.5);
  padding:36px 28px;
}
.foot-inner{
  max-width:1200px;margin:0 auto;
  display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px;
}
.foot-logo{font-family:'Noto Serif Bengali',serif;color:#fff;font-size:1.2rem;font-weight:700;display:block;margin-bottom:4px;}

@keyframes fadeUp{from{opacity:0;transform:translateY(20px);}to{opacity:1;transform:translateY(0);}}

@media(max-width:600px){
  .banner{height:300px;}
  .banner-content{padding:24px 20px 22px;}
  .btitle{font-size:2.2rem;}
  .gallery img{height:80px;width:130px;}
  .stats-inner{gap:0;}
  .si{min-width:90px;padding:12px 12px;}
  .hdr{padding:0 16px;}
}
</style>
</head>
