<style>
:root{
  --fd:'Noto Serif Bengali','Hind Siliguri',serif;
  --fb:'Hind Siliguri',sans-serif;
  --green:#0b5c2e;--green2:#168040;--green3:#1fa04e;
  --green-pale:#e5f5ec;--green-dark:#083d1e;
  --gold:#d4a017;--text:#181818;--muted:#4e6358;
  --bg:#f2f7f4;--white:#fff;--border:#cce0d4;
  --sh:0 2px 18px rgba(11,92,46,0.09);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{font-family:var(--fb);background:var(--bg);color:var(--text);}

/* HEADER */
header{background:linear-gradient(100deg,var(--green-dark),var(--green));color:#fff;padding:12px 20px;display:flex;align-items:center;gap:14px;position:sticky;top:0;z-index:300;box-shadow:0 3px 20px rgba(0,0,0,.25);}
.back{color:#fff;text-decoration:none;font-size:.87rem;background:rgba(255,255,255,.15);padding:7px 16px;border-radius:20px;transition:background .2s;white-space:nowrap;}
.back:hover{background:rgba(255,255,255,.26);}
.hlogo{font-family:var(--fd);font-size:1.1rem;font-weight:700;color:#fff;text-decoration:none;}

/* AD LEADERBOARD */
.ad-leader{background:#fff;border-bottom:1px solid var(--border);text-align:center;padding:8px 10px;min-height:62px;overflow:hidden;}
.ad-lbl{font-size:.62rem;color:#c0c0c0;display:block;margin-bottom:3px;text-transform:uppercase;letter-spacing:.05em;}

/* BANNER */
.banner{position:relative;height:400px;overflow:hidden;background:linear-gradient(135deg,var(--green-dark),var(--green2));}
.banner-img{width:100%;height:100%;object-fit:cover;opacity:.6;display:block;}
.banner-grad{position:absolute;inset:0;background:linear-gradient(to top,rgba(8,61,30,.95) 0%,rgba(8,61,30,.4) 55%,transparent 100%);}
.banner-content{position:absolute;bottom:0;left:0;right:0;padding:32px 28px 30px;}
.bmax{max-width:980px;margin:0 auto;}
.bbadge{display:inline-flex;align-items:center;gap:6px;background:rgba(212,160,23,.92);color:#1a1a1a;font-size:.74rem;font-weight:700;padding:4px 14px;border-radius:14px;margin-bottom:10px;}
.btitle{font-family:var(--fd);font-size:clamp(2.2rem,5vw,3.6rem);font-weight:700;color:#fff;text-shadow:0 3px 18px rgba(0,0,0,.4);line-height:1.15;margin-bottom:6px;}
.bsub{color:rgba(255,255,255,.82);font-size:1rem;line-height:1.55;}

/* GALLERY */
.gallery{display:flex;gap:8px;padding:14px 20px;overflow-x:auto;background:#fff;border-bottom:1px solid var(--border);scrollbar-width:none;}
.gallery::-webkit-scrollbar{display:none;}
.gallery img{height:105px;width:168px;object-fit:cover;border-radius:8px;flex-shrink:0;cursor:pointer;transition:transform .2s,box-shadow .2s;border:2px solid var(--border);}
.gallery img:hover{transform:scale(1.05);box-shadow:0 4px 16px rgba(11,92,46,.2);border-color:var(--green);}

/* STATS BAR */
.sbar{background:#fff;border-bottom:1px solid var(--border);padding:12px 20px;}
.sbar-in{max-width:980px;margin:0 auto;display:flex;flex-wrap:wrap;}
.si{flex:1;min-width:110px;padding:8px 14px;border-right:1px solid var(--border);text-align:center;}
.si:last-child{border-right:none;}
.sin{font-family:var(--fd);font-size:1.12rem;font-weight:700;color:var(--green);display:block;}
.sil{font-size:.7rem;color:var(--muted);}

/* AD after stats */
.ad-rect{background:#fff;border:1px solid var(--border);text-align:center;padding:10px;min-height:100px;overflow:hidden;}
.ad-rect-wrap{max-width:980px;margin:0 auto;padding:12px 20px;}

/* CONTENT GRID */
.wrap{max-width:980px;margin:0 auto;padding:24px 20px 60px;display:grid;grid-template-columns:1fr 290px;gap:24px;}
@media(max-width:860px){.wrap{grid-template-columns:1fr;}}

/* SECTIONS */
.sec{background:#fff;border-radius:12px;border:1px solid var(--border);padding:24px;margin-bottom:20px;box-shadow:var(--sh);}
.sh{display:flex;align-items:center;gap:10px;margin-bottom:16px;padding-bottom:12px;border-bottom:2px solid var(--green-pale);}
.sico{width:40px;height:40px;background:var(--green-pale);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:1.25rem;flex-shrink:0;}
.stl{font-family:var(--fd);font-size:1.18rem;font-weight:700;color:var(--green);}
.sbody{font-size:.95rem;line-height:1.95;color:var(--text);}
.sbody p{margin-bottom:12px;}
.sbody p:last-child{margin-bottom:0;}
.sbody h4{font-family:var(--fd);color:var(--green);font-size:1.02rem;margin:16px 0 6px;}

/* PLACE CARDS */
.pgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px;}
.pc{background:var(--green-pale);border-radius:9px;padding:14px;border:1px solid var(--border);}
.pc-img{width:100%;height:84px;object-fit:cover;border-radius:7px;margin-bottom:8px;border:1px solid var(--border);}
.pico{font-size:1.5rem;margin-bottom:5px;}
.pname{font-family:var(--fd);font-size:.95rem;font-weight:700;color:var(--green);margin-bottom:3px;}
.pdesc{font-size:.78rem;color:var(--muted);line-height:1.5;}

/* FOOD */
.fgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;}
.fc{text-align:center;background:var(--green-pale);border-radius:9px;padding:16px 10px;border:1px solid var(--border);}
.ficon{font-size:2.1rem;margin-bottom:6px;}
.fname{font-family:var(--fd);font-size:.9rem;font-weight:700;color:var(--green);}
.fdesc{font-size:.74rem;color:var(--muted);margin-top:3px;line-height:1.45;}

/* PERSONS */
.plist{display:flex;flex-direction:column;gap:12px;}
.pcard{display:flex;gap:14px;align-items:flex-start;background:var(--green-pale);border-radius:9px;padding:14px;border:1px solid var(--border);}
.pav{width:46px;height:46px;border-radius:50%;background:var(--green);color:#fff;display:flex;align-items:center;justify-content:center;font-size:1.3rem;flex-shrink:0;}
.pname2{font-family:var(--fd);font-size:.98rem;font-weight:700;color:var(--green);}
.prole{font-size:.78rem;color:var(--muted);margin-top:2px;line-height:1.45;}

/* SIDEBAR */
.sbc{background:#fff;border-radius:12px;border:1px solid var(--border);padding:18px;margin-bottom:16px;box-shadow:var(--sh);}
.sbt{font-family:var(--fd);font-size:1rem;font-weight:700;color:var(--green);margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--green-pale);}
.sbr{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid var(--green-pale);font-size:.84rem;}
.sbr:last-child{border-bottom:none;}
.sbk{color:var(--muted);}
.sbv{font-weight:600;color:var(--text);}
.ad-side{background:#fff;border:1px solid var(--border);border-radius:10px;padding:10px;text-align:center;min-height:280px;margin-bottom:16px;overflow:hidden;}
.tags{display:flex;flex-wrap:wrap;gap:6px;}
.tag{background:var(--green-pale);color:var(--green);font-size:.77rem;padding:4px 10px;border-radius:14px;border:1px solid var(--border);}

/* BOTTOM NAV */
.bnav{max-width:980px;margin:0 auto 40px;padding:0 20px;display:flex;gap:12px;}
.nb{flex:1;padding:13px;border:1px solid var(--border);border-radius:9px;background:#fff;cursor:pointer;font-family:var(--fb);font-size:.84rem;color:var(--muted);text-decoration:none;text-align:center;transition:all .2s;}
.nb:hover{border-color:var(--green);color:var(--green);}
.nb strong{display:block;font-family:var(--fd);font-size:1rem;color:var(--text);}

/* AD BOTTOM */
.ad-bottom-wrap{max-width:980px;margin:0 auto;padding:0 20px 20px;}
.ad-bottom{background:#fff;border:1px solid var(--border);border-radius:10px;text-align:center;padding:10px;min-height:100px;overflow:hidden;}

footer{background:linear-gradient(100deg,var(--green-dark),var(--green));color:rgba(255,255,255,.78);text-align:center;padding:24px 20px;font-size:.84rem;}
.flogo2{font-family:var(--fd);color:#fff;font-size:1.1rem;display:block;margin-bottom:5px;}
.fad{margin:12px auto;max-width:728px;min-height:60px;overflow:hidden;}

@media(max-width:600px){
  .banner{height:260px;}
  .btitle{font-size:1.9rem;}
  .gallery img{height:82px;width:126px;}
  .sbar-in{gap:0;}
  .si{min-width:90px;padding:6px 8px;}
}
</style>
</head>

const DB={
  dhaka:{
    name:"ঢাকা",emoji:"🏙️",div:"ঢাকা",area:"১,৪৬৩",pop:"১ কোটি ৪০ লক্ষ+",upazila:"৫",found:"১৬১০",

    history:`ঢাকা বাংলাদেশের রাজধানী ও সর্ববৃহৎ মহানগরী। এর ইতিহাস হাজার বছরের পুরনো। মুঘল সুবাদার ইসলাম খান ১৬১০ সালে ঢাকাকে বাংলার রাজধানী ঘোষণা করেন এবং এর নাম রাখেন "জাহাঙ্গীরনগর"। তখন থেকেই এটি বাণিজ্য ও প্রশাসনের কেন্দ্র।\n\n"ঢাকাই মসলিন" ছিল মধ্যযুগের সবচেয়ে বিখ্যাত বস্ত্র — এতটাই সূক্ষ্ম যে একটি পূর্ণ কাপড় একটি আংটির মধ্য দিয়ে গলে যেত। ইউরোপীয় রাজদরবারেও এর কদর ছিল।\n\nব্রিটিশ শাসনামলে ঢাকা ১৯০৫ সালে পূর্ববঙ্গ ও আসামের রাজধানী হয়। ১৯৪৭ সালে পাকিস্তান প্রতিষ্ঠার পর এটি পূর্ব পাকিস্তানের রাজধানী। ১৯৫২ সালের ভাষা আন্দোলন, ১৯৬৯-এর গণঅভ্যুত্থান ও ১৯৭১-এর মুক্তিযুদ্ধের কেন্দ্রবিন্দু ছিল ঢাকা। ২৫ মার্চ ১৯৭১ সালে পাকিস্তানি বাহিনী "অপারেশন সার্চলাইট" পরিচালনা করে ঢাকায় গণহত্যা চালায়। ১৬ ডিসেম্বর ১৯৭১ বাংলাদেশ স্বাধীন হয়।\n\nবর্তমানে প্রায় দুই কোটির বেশি মানুষের এই শহরে জাতীয় সংসদ ভবন, সুপ্রিম কোর্ট, প্রধান বিমানবন্দর, শীর্ষ বিশ্ববিদ্যালয় সবই এখানে। ঢাকার বুড়িগঙ্গা, শীতলক্ষ্যা ও তুরাগ নদী একসময় এই শহরের প্রাণ ছিল।`,
    places:[

      {ico:"🥩",nm:"শিক কাবাব",desc:"পুরান ঢাকার বিখ্যাত কাবাব। নাজিরাবাজারের কাবাব বিশেষভাবে জনপ্রিয়।"},
